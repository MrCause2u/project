name: Android Release Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # To enable secure signing, add these secrets to your GitHub Repository:
    # 1. KEYSTORE_BASE64: The base64 string of your keystore (.jks) file
    #    (Run `openssl base64 < my-release-key.jks | tr -d '\n'` to generate it)
    # 2. KEYSTORE_PASSWORD: The password for the keystore
    # 3. KEY_ALIAS: The alias name used when generating the key
    # 4. KEY_PASSWORD: The password for the specific key

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ ! -z "$KEYSTORE_BASE64" ]; then
          echo $KEYSTORE_BASE64 | base64 --decode > release.jks
        else
          echo "Warning: KEYSTORE_BASE64 secret is missing. Release APK will be unsigned if signing block mandates it."
        fi

    - name: Build Signed Release APK
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --no-daemon

    - name: Build Release Bundle (AAB)
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew bundleRelease --no-daemon

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SoundWave-Release-APK
        path: app/build/outputs/apk/release/app-release.apk

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: SoundWave-Release-AAB
        path: app/build/outputs/bundle/release/app-release.aab
